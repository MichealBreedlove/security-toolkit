name: Secret Scan

# CI gate — runs on every push and pull request.
# Exits non-zero and blocks merge if any of the 11 credential patterns are found.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  statuses: write

jobs:
  secret-scan:
    name: Scan for Credentials
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch full history so we can scan all changed files across commits
          fetch-depth: 0

      - name: Make script executable
        run: chmod +x scripts/secret_scan.sh

      - name: Run secret scan
        id: scan
        run: |
          # Scan the entire repository checkout.
          # Exits non-zero if credential patterns are found, failing this job.
          ./scripts/secret_scan.sh .

      - name: Run secret scan (JSON artifact)
        if: always()
        run: |
          ./scripts/secret_scan.sh --json . > scan-results.json || true

      - name: Upload scan results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-results
          path: scan-results.json
          retention-days: 30

      - name: Annotate PR on failure
        if: failure() && github.event_name == 'pull_request'
        run: |
          echo "::error title=Secret Scan Failed::Credential patterns detected. Review the scan-results artifact and remove or rotate any exposed secrets. Use scripts/sanitize.sh to strip values before committing."
